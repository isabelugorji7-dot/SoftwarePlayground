<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bella's Restaurant Reservations</title>
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Your CSS FIRST so it can override Bootstrap -->
    {% load static %}
    <link rel="stylesheet" href="{% static 'css/reservations.css' %}">


  </head>

<body>
    <form class="booking-form">

    <h4>Book a Table</h4>
    <h6>Reserve your dining experience below</h6>

    <div>
        <label>First Name</label>
        <input name="first-name" type="text" required>
    </div>

    <div>
        <label>Last Name</label>
        <input name="last-name" type="text" required>
    </div>

    <div>
        <label>Email Address</label>
        <input name="email-address" type="email" required>
    </div>

    <div>
        <label>Phone Number</label>
        <input name="phone-number" type="tel" required>
    </div>

    <div>
        <label>Date</label>
        <input name="date" type="date" required>
    </div>

    <div>
        <label>Time</label>
        <input name="time" type="time">
    </div>

    <div>
        <label>Number of Guests</label>
        <input name="num-of-guests" min="1" max="30" type="number" required>
    </div>

    <button type="submit" class="btn">Submit Booking</button>

</form>


</body>
</html>
