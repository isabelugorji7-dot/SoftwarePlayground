<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bella's Restaurant Conatact Us</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    {% load static %}
    <link rel="stylesheet" href="{% static 'css/contact.css' %}">

</head>
<body class="contact-page">
    <header>
        <h4>Contact Us</h4>
        <h6>For media</h6>
    </header>

    <main>
        <!-- CONTACT FORM STARTS -->
         <form>
               <label>First Name</label>
            <input type="text" name="first name" id="first-name">
        </div> <br> <br>

        <div>
            <label>Last Name</label>
            <input type="text" name="last name"  id="last-name">
        </div> <br>

        <div>
            <label>Email Address</label>
            <input type="email" name="email-address" id="email-address">
        </div> <br>

        <div>
            <label>Phone Number</label>
            <input type="tel" name="phone-number" id="phone-number">
        </div> <br>

        <div>
            <label>Message</label>
            <textarea name="message" rows="3" cols="54" ></textarea>
        </div>

        <button type="submit" class="btn">Submit Message</button>
         </form>
        <div> <br>
 
        <!-- CONTACT FORM ENDS -->        

        <!-- LINK TO SOCIAL MEDIA STARTS  -->
        <h6 style="text-align: center;"> Feel free to visit our social media pages </h6>
        <ul class="nav justify-content-center">
            <li class="nav-item">
            <a class="nav-link active" aria-current="page" href="https://www.instagram.com/thatgurl_izie/?hl=en">Instagram</a>
            </li>
            <li class="nav-item">
            <a class="nav-link" href="https://uk.pinterest.com/izzybells7/?invite_code=741f54c941fa443cb4da4e3dbd4ef535&sender=993325398970411361">Pinterest</a>
            </li>
            <li class="nav-item">
            <a class="nav-link" href="https://github.com/isabelugorji7-dot">GitHub</a>
            </li>
        </ul>
        <!-- LINK TO SOCIAL MEDIA ENDS -->
        
        
    </main>
</body>
</html>
